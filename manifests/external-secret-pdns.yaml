apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pdns
  namespace: dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pdns           # name of the resulting k8s Secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: secret/data/k8s/pdns
        property: api-key
